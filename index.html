<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Anh xin lỗi bé tí </title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: url("667598946_4267533930129881_5988623769269300318_n.jpg") center/cover no-repeat;
      font-family: Arial, sans-serif;
      text-align: center;
    }

    .box {
      background: url("meo.jpg.jpg") center/cover no-repeat;
      padding: 30px;
      border-radius: 20px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
      position: relative;
    }

    /* làm mờ để chữ dễ đọc */
    .box::before {
      content: "";
      position: absolute;
      inset: 0;
      background: rgba(255,255,255,0.7);
      border-radius: 20px;
    }

    .box * {
      position: relative;
      z-index: 1;
    }

    h1 {
      color: #ff4d6d;
    }

    img {
      width: 150px;
      margin-bottom: 20px;
    }

    button {
      padding: 10px 20px;
      margin: 10px;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      cursor: pointer;
    }

    #yes {
      background: #ff4d6d;
      color: white;
    }

    #no {
      background: #ccc;
      color: white;
      position: fixed;
    }
  </style>
</head>
<body>

<div class="box">
  <img src="https://media.tenor.com/3h1WgYcX0kMAAAAC/cute-sorry.gif">
  <h1>Anh xin lỗi bé tí ạ </h1>
  <p>Tha lỗi cho anh nhaaa </p>

  <button id="yes" onclick="accept()">Oke ❤️</button>
  <button id="no">Không 😤</button>
</div>

<script>
  function accept() {
    document.body.innerHTML = "<h1>Cảm ơn em ❤️ Anh yêu em nhiều lắm 🥺</h1>";
  }

  const noBtn = document.getElementById("no");

  function moveButton() {
    const btnWidth = noBtn.offsetWidth;
    const btnHeight = noBtn.offsetHeight;

    const x = Math.random() * (window.innerWidth - btnWidth);
    const y = Math.random() * (window.innerHeight - btnHeight);

    noBtn.style.left = x + "px";
    noBtn.style.top = y + "px";
  }

  document.addEventListener("mousemove", (e) => {
    const rect = noBtn.getBoundingClientRect();

    const centerX = rect.left + rect.width / 2;
    const centerY = rect.top + rect.height / 2;

    const distance = Math.hypot(e.clientX - centerX, e.clientY - centerY);

    if (distance < 100) {
      moveButton();
    }
  });
</script>

</body>
</html>
