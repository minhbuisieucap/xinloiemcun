<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Anh xin lỗi bé tí ạ </title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #ffe6f0;
      font-family: Arial, sans-serif;
      text-align: center;
    }

    .box {
      background: url("meo.jpg") center/cover no-repeat;
      padding: 30px;
      border-radius: 20px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
      position: relative;
      overflow: hidden;
    }

    /* lớp làm mờ để chữ dễ đọc */
    .box::before {
      content: "";
      position: absolute;
      inset: 0;
      background: rgba(255, 255, 255, 0.75);
      border-radius: 20px;
    }

    .content {
      position: relative;
      z-index: 1;
    }

    h1 {
      color: #ff4d6d;
    }

    button {
      padding: 10px 20px;
      margin: 10px;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      cursor: pointer;
    }

    #yes {
      background: #ff4d6d;
      color: white;
    }

    #no {
      background: #ccc;
      color: white;
      position: relative;
    }
  </style>
</head>
<body>

<div class="box">
  <div class="content">
    <h1>Anh xin lỗi bé tí ạ </h1>
    <p>Tha lỗi cho anh nhaaa </p>

    <button id="yes" onclick="accept()">Oke ❤️</button>
    <button id="no">Không 😤</button>
  </div>
</div>

<script>
  function accept() {
    document.body.innerHTML = `
      <div style="
        height:100vh;
        display:flex;
        justify-content:center;
        align-items:center;
        background:url('girl.jpg') center/cover no-repeat;
        color:white;
        font-size:30px;
        text-shadow: 0 0 10px black;
      ">
        Cảm ơn em ❤️ Anh yêu em nhiều lắm 🥺
      </div>
    `;
  }

  const noBtn = document.getElementById("no");

  noBtn.addEventListener("mouseover", () => {
    const x = Math.random() * (window.innerWidth - 100);
    const y = Math.random() * (window.innerHeight - 50);

    noBtn.style.position = "absolute";
    noBtn.style.left = x + "px";
    noBtn.style.top = y + "px";
  });
</script>

</body>
</html>
