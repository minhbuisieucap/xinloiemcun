<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Anh xin lỗi bé tí ạ </title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #ffe6f0;
      font-family: Arial, sans-serif;
      text-align: center;
    }

    .box {
      background: url("meo.jpg.jpg") center/cover no-repeat;
      padding: 30px;
      border-radius: 20px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
      position: relative;
      overflow: visible;
    }

    /* lớp làm mờ để chữ dễ đọc */
    .box::before {
      content: "";
      position: absolute;
      inset: 0;
      background: rgba(255, 255, 255, 0.75);
      border-radius: 20px;
    }

    .content {
      position: relative;
      z-index: 1;
    }

    h1 {
      color: #ff4d6d;
    }

    button {
      padding: 10px 20px;
      margin: 10px;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      cursor: pointer;
    }

    #yes {
      background: #ff4d6d;
      color: white;
    }

    #no {
      background: #ccc;
      color: white;
      position: fixed;
    }
  </style>
</head>
<body>

<div class="box">
  <div class="content">
    <h1>Anh xin lỗi bé tí ạ </h1>
    <p>Tha lỗi cho anh nhaaa </p>

    <button id="yes" onclick="accept()">Oke ❤️</button>
    <button id="no">Không 😤</button>
  </div>
</div>

<script>
function accept() {
  document.body.innerHTML = `
    <div style="
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: url('667598946_4267533930129881_5988623769269300318_n.jpg') center/cover no-repeat;
      display: flex;
      justify-content: center;
      align-items: center;
      color: white;
      font-size: 30px;
      text-shadow: 0 0 10px black;
    ">
      Cảm ơn em ❤️ Anh yêu em nhiều lắm 🥺
    </div>
  `;
const noBtn = document.getElementById("no");

function moveButton() {
  const btnWidth = noBtn.offsetWidth;
  const btnHeight = noBtn.offsetHeight;

  const x = Math.random() * (window.innerWidth - btnWidth);
  const y = Math.random() * (window.innerHeight - btnHeight);

  noBtn.style.left = x + "px";
  noBtn.style.top = y + "px";
}

// chạy khi chuột lại gần
document.addEventListener("mousemove", (e) => {
  const rect = noBtn.getBoundingClientRect();

  const centerX = rect.left + rect.width / 2;
  const centerY = rect.top + rect.height / 2;

  const distance = Math.hypot(e.clientX - centerX, e.clientY - centerY);

  if (distance < 100) {
    moveButton();
  }
});

// chạy random nhẹ liên tục (để nó "sống động")
setInterval(() => {
  moveButton();
}, 2000);
</script>

</body>
</html>
